<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Word Search</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --found: #2ecc71; --bg: #0a0a0c; --card: #16161a; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui-layer {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            border-bottom: 2px solid #333;
        }

        .word-bank {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
        }

        .word-tag {
            background: #222;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .word-tag.found {
            background: var(--found);
            border-color: #fff;
            text-decoration: line-through;
            transform: scale(0.95);
        }

        #grid-container {
            margin: auto;
            display: grid;
            gap: 4px;
            background: #222;
            padding: 6px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .cell {
            width: clamp(30px, 8vw, 45px);
            height: clamp(30px, 8vw, 45px);
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 4px;
            transition: 0.1s;
            user-select: none;
        }

        .cell.highlight { background: var(--neon); color: black; }
        .cell.correct { background: var(--found); color: white; }

        .btn-reset {
            background: var(--neon);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>
            <h2 style="margin:0; font-size: 1.2rem; color: var(--neon);">Word Search</h2>
            <small id="stat">Find 6 space words</small>
        </div>
        <button class="btn-reset" onclick="initGame()">New Game</button>
    </div>

    <div class="word-bank" id="word-bank"></div>

    <div id="grid-container"></div>

    <script>
        const WORD_LIST = [
            {en:"SPACE", he:"חלל"}, {en:"MOON", he:"ירח"}, 
            {en:"STAR", he:"כוכב"}, {en:"MARS", he:"מאדים"}, 
            {en:"EARTH", he:"כדור הארץ"}, {en:"SUN", he:"שמש"}
        ];

        let gridSize = 10;
        let grid = [];
        let foundWords = [];
        let selecting = false;
        let selection = [];

        function initGame() {
            foundWords = [];
            grid = Array(gridSize).fill().map(() => Array(gridSize).fill(''));
            
            // 1. Place Words
            WORD_LIST.forEach(wordObj => {
                placeWord(wordObj.en);
            });

            // 2. Fill Randoms
            for(let r=0; r<gridSize; r++) {
                for(let c=0; c<gridSize; c++) {
                    if(grid[r][c] === '') {
                        grid[r][c] = String.fromCharCode(65 + Math.floor(Math.random()*26));
                    }
                }
            }

            renderUI();
        }

        function placeWord(word) {
            let placed = false;
            while(!placed) {
                const dir = [[0,1], [1,0], [1,1]][Math.floor(Math.random()*3)]; // H, V, D
                const row = Math.floor(Math.random() * gridSize);
                const col = Math.floor(Math.random() * gridSize);

                if (canPlace(word, row, col, dir)) {
                    for(let i=0; i<word.length; i++) {
                        grid[row + i*dir[0]][col + i*dir[1]] = word[i];
                    }
                    placed = true;
                }
            }
        }

        function canPlace(word, r, c, dir) {
            if (r + word.length * dir[0] > gridSize || c + word.length * dir[1] > gridSize) return false;
            for(let i=0; i<word.length; i++) {
                let char = grid[r + i*dir[0]][c + i*dir[1]];
                if(char !== '' && char !== word[i]) return false;
            }
            return true;
        }

        function renderUI() {
            const container = document.getElementById('grid-container');
            container.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            container.innerHTML = '';

            for(let r=0; r<gridSize; r++) {
                for(let c=0; c<gridSize; c++) {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.innerText = grid[r][c];
                    div.dataset.r = r;
                    div.dataset.c = c;
                    
                    // Touch Events
                    div.onpointerdown = (e) => startSelect(div);
                    div.onpointerenter = (e) => continueSelect(div);
                    
                    container.appendChild(div);
                }
            }

            const bank = document.getElementById('word-bank');
            bank.innerHTML = WORD_LIST.map(w => `
                <div class="word-tag" id="tag-${w.en}">
                    <b>${w.en}</b><br><small>${w.he}</small>
                </div>
            `).join('');

            document.onpointerup = endSelect;
        }

        function startSelect(el) { 
            selecting = true; 
            selection = [el]; 
            el.classList.add('highlight');
        }

        function continueSelect(el) {
            if(!selecting || selection.includes(el)) return;
            selection.push(el);
            el.classList.add('highlight');
        }

        function endSelect() {
            if(!selecting) return;
            selecting = false;
            
            const selectedWord = selection.map(el => el.innerText).join('');
            const reversedWord = selectedWord.split('').reverse().join('');
            
            const match = WORD_LIST.find(w => w.en === selectedWord || w.en === reversedWord);

            if(match && !foundWords.includes(match.en)) {
                foundWords.push(match.en);
                selection.forEach(el => {
                    el.classList.remove('highlight');
                    el.classList.add('correct');
                });
                document.getElementById(`tag-${match.en}`).classList.add('found');
                speak(match.en);
                
                if(foundWords.length === WORD_LIST.length) {
                    confetti({ particleCount: 200, spread: 80 });
                }
            } else {
                selection.forEach(el => el.classList.remove('highlight'));
            }
            selection = [];
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US';
            window.speechSynthesis.speak(m);
        }

        initGame();
    </script>
</body>
</html>
